events {}

http {

    include mime.types;

    upstream apis {
        server host.docker.internal:3001 weight=5;
        server host.docker.internal:3002 weight=3;
        server host.docker.internal:3003 weight=2;
        server host.docker.internal:3004;
    }

    server {
        listen 80;
        server_name localhost;

        location / {
            proxy_pass http://apis/;
        }
    }
}